name: Frontend Tests

on:
  push:
    branches:
      - Tony/testingPipeline
  pull_request:
    branches:
      - Tony/testingPipeline

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run Vitest
        run: npm test
        continue-on-error: true