name: soundsync_mobile
description: SoundSyncAI — Sound Transit tracker for mobile.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  flutter_secure_storage: ^9.0.0
  go_router: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/routes.csv
